- ros_topic_name: "/robot/lidar_2d"
  gz_topic_name: "/robot/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# 3D Lidar
- ros_topic_name: "/robot/lidar_3d"
  gz_topic_name: "/robot/lidar_3d/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
