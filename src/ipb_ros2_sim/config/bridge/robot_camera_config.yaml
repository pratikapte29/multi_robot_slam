- ros_topic_name: "/robot/cam_up/image_raw"
  gz_topic_name: "/robot/cam_up/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# RGB camera info
- ros_topic_name: "/robot/cam_up/camera_info"
  gz_topic_name: "/robot/cam_up/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
